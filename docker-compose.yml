version: "3.9"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo_pass}
      POSTGRES_DB: ${POSTGRES_DB:-geo_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-geo}:${POSTGRES_PASSWORD:-geo_pass}@postgres:5432/${POSTGRES_DB:-geo_db}
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: redis://redis:6379/0
      RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-geo}:${POSTGRES_PASSWORD:-geo_pass}@postgres:5432/${POSTGRES_DB:-geo_db}
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: redis://redis:6379/0
      RESULT_BACKEND: redis://redis:6379/1
    command: celery -A app.celery_app.celery worker --loglevel=info
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

